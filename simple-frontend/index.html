<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Assistance AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 600px; margin: auto; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Citizen Assistance AI Platform</h1>
    <form id="incidentForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="number" id="age" placeholder="Age" required>
        <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
        <textarea id="description" placeholder="Incident Description" required></textarea>
        <input type="text" id="location" placeholder="Location (lat,lon)" required>
        <input type="datetime-local" id="date_time" required>
        <input type="number" id="severity" placeholder="Severity (1-10)" min="1" max="10" value="5">
        <button type="submit">Submit Report</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('incidentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                description: document.getElementById('description').value,
                location: document.getElementById('location').value,
                date_time: document.getElementById('date_time').value,
                severity: parseInt(document.getElementById('severity').value)
            };
            try {
                const response = await fetch('http://localhost:8000/report_incident', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                displayResult(result);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = '<p>Error submitting report: ' + error.message + '</p>';
            }
        });

        function displayResult(result) {
            let html = `<h2>Report Submitted</h2>
                        <p><strong>Case ID:</strong> ${result.case_id}</p>
                        <p><strong>Incident Type:</strong> ${result.incident_type}</p>
                        <p><strong>Severity:</strong> ${result.severity_score}</p>
                        <h3>Legal Sections</h3><ul>`;
            result.legal_sections.forEach(sec => html += `<li>${sec}</li>`);
            html += `</ul><h3>Immediate Steps</h3><ul>`;
            result.immediate_steps.forEach(step => html += `<li>${step}</li>`);
            html += `</ul><h3>Nearest Police Station</h3>
                     <p>${result.nearest_police_station.name}</p>
                     <p>${result.nearest_police_station.address}</p>
                     <p>Phone: ${result.nearest_police_station.phone}</p>
                     <p>Email: ${result.nearest_police_station.email}</p>
                     <h3>Expected Response (24-48h)</h3><ul>`;
            result.expected_response_24_48h.forEach(resp => html += `<li>${resp}</li>`);
            html += `</ul><h3>Escalation Steps</h3><ul>`;
            result.escalation_steps.forEach(step => html += `<li>${step}</li>`);
            html += `</ul><p><strong>Timeline Estimate:</strong> ${result.timeline_estimate_days} days</p>
                     <h3>Complaint Template</h3><pre>${result.complaint_template}</pre>
                     <p><em>${result.disclaimer}</em></p>`;
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
